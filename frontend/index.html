<!DOCTYPE html>
<html>
<head>
    <title>Animal Detection AI</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ffe6f0, #fff);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(255, 105, 180, 0.3);
            width: 450px;
            text-align: center;
        }

        h1 {
            color: #ff4da6;
        }

        input {
            margin: 15px 0;
        }

        button {
            background: #ff4da6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e60073;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            background: #fff0f6;
            border-radius: 10px;
            min-height: 80px;
            white-space: pre-wrap;
            color: #333;
        }

        .loader {
            display: none;
            margin-top: 10px;
            color: #ff4da6;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🐾 Animal Detection AI</h1>

    <input type="file" id="img"><br>

    <button onclick="predict()">Detect Animal</button>

    <div class="loader" id="loader">Processing image...</div>

    <div id="output">Result will appear here...</div>
</div>

<script>
async function predict() {
    let file = document.getElementById("img").files[0];

    if (!file) {
        alert("Please upload an image first!");
        return;
    }

    document.getElementById("loader").style.display = "block";
    document.getElementById("output").innerText = "";

    let form = new FormData();
    form.append("file", file);

    try {
        let res = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            body: form
        });

        let data = await res.json();

        document.getElementById("output").innerText = data.result;

    } catch (error) {
        document.getElementById("output").innerText = "Error connecting to backend!";
    }

    document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
